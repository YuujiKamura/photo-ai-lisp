<!DOCTYPE html>
<!--
  Adapted from: photo-ai-rust/web/index.html (structure only).
  Stripped to the minimum that actually works: header + left sidebar
  (masters + presets) + terminal iframe. Disabled-button mocks and
  unimplemented tabs have been removed to avoid lying to the user
  about what's wired.
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<title>photo-ai-lisp</title>
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #22222a;
    --border: #33333a;
    --text: #e6e6ea;
    --text-muted: #8a8a94;
    --accent: #7c6fe0;
    --input-bg: #15151a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex;
  }

  .sidebar {
    width: 280px; padding: 12px;
    border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    flex-shrink: 0;
  }
  .sidebar .brand {
    font-size: 14px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px;
  }
  .sidebar .hint {
    font-size: 10px; color: var(--text-muted); line-height: 1.4;
  }
  .sidebar h2 {
    font-size: 11px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .btn {
    display: block; width: 100%; padding: 6px 10px;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; cursor: pointer; text-align: left;
    margin-bottom: 4px;
  }
  .btn:hover { border-color: var(--accent); }

  .terminal {
    flex: 1;
    background: #0f0f0f;
    min-width: 0;
  }
  .terminal iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }

  .placeholder {
    color: var(--text-muted); font-size: 12px; line-height: 1.6;
  }

  /* #37 case C — inject form */
  .inject-form {
    display: flex; flex-direction: column; gap: 6px;
    border-top: 1px solid var(--border); padding-top: 12px;
  }
  .inject-form label {
    font-size: 11px; text-transform: uppercase; color: var(--text-muted);
  }
  .inject-form textarea {
    width: 100%; rows: 3;
    background: #0f0f14; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px;
    padding: 6px 8px; resize: vertical;
    outline: none; transition: border-color .15s;
  }
  .inject-form textarea:focus { border-color: var(--accent); }
  .inject-form textarea.ok   { border-color: #4caf82; }
  .inject-form textarea.err  { border-color: #ff6a6a; }
  .inject-form .inject-row {
    display: flex; gap: 6px; align-items: center;
  }
  .inject-form .inject-send {
    flex-shrink: 0; padding: 5px 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  .inject-form .inject-send:disabled { opacity: .5; cursor: default; }
  .inject-form .inject-send:hover:not(:disabled) { opacity: .85; }
  .inject-form .inject-hint {
    font-size: 10px; color: var(--text-muted);
  }
  .master-group { margin-bottom: 8px; }
  .master-group > .head {
    font-size: 12px; font-weight: 600; margin-bottom: 2px;
  }
  .master-group ul {
    list-style: none; padding-left: 8px; font-size: 12px;
    color: var(--text-muted);
  }

  /* G2.b (issue #30 Phase 2 Team β) — CP busy indicator.
     Hidden by default; the /ws/control status handler toggles it on
     STATUS=PROCESSING and off on STATUS=IDLE.  Inline CSS, zero deps.
     The spinner glyph uses a CSS keyframe so we don't need an image. */
  .cp-status {
    display: none;
    font-size: 14px;
    color: var(--text-muted);
    padding: 6px 10px;
    margin-top: 4px;
    border-radius: 4px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    line-height: 1.2;
  }
  .cp-status.active { display: inline-block; }
  .cp-status.error  {
    display: inline-block;
    color: #ff6a6a;
    border-color: #ff6a6a;
  }
  .cp-status .glyph {
    display: inline-block;
    animation: cp-spin 1.2s linear infinite;
  }
  @keyframes cp-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div>
    <div class="brand">photo-ai-lisp</div>
    <div class="hint">curl /api/inject?text=... で外部からコマンド送信</div>
    <!-- G2.b: in-flight CP command indicator. Hidden until /ws/control
         pushes a status envelope with content.state=processing. -->
    <div id="cp-status" class="cp-status" aria-live="polite">
      <span class="glyph">⟳</span> <span class="label">processing…</span>
    </div>
  </div>
  <div>
    <h2>プリセット</h2>
    <div id="presetList" class="placeholder">(読込中)</div>
  </div>
  <div class="inject-form">
    <label>PTY 入力 (IME 対応)</label>
    <textarea id="inject-text" rows="3" placeholder="入力 (Ctrl+Enter で送信)"></textarea>
    <div class="inject-row">
      <button class="inject-send" id="inject-send">Send</button>
      <span class="inject-hint">Ctrl+Enter で送信 / Enter は改行</span>
    </div>
  </div>
</aside>

<section class="terminal">
  <iframe id="terminal" src="about:blank"></iframe>
</section>

<script>
  // Terminal iframe — ghostty-web URL (or built-in /shell) injected by Lisp server.
  const ghosttyUrl = document.documentElement.dataset.ghosttyUrl;
  const termFrame = document.getElementById('terminal');
  if (ghosttyUrl) {
    termFrame.src = ghosttyUrl;
  }
  // Iframed ghostty-web renders into a hidden textarea for IME input.
  // That textarea only receives keystrokes when the iframe's window holds
  // focus — which it doesn't on first load (the parent document does).
  // Pull focus into the iframe once it's ready, and re-pull on window focus.
  termFrame.addEventListener('load', () => termFrame.contentWindow.focus());
  window.addEventListener('focus', () => termFrame.contentWindow.focus());

  // Live-reload channel. Server pushes 'reload:<module>' after /api/reload.
  //   term     -> the /shell page changed; re-src the iframe only.
  //   business-ui / all / static -> sidebar HTML changed; swap in place.
  // Either path avoids a full page refresh so the PTY (owned by Lisp)
  // keeps running and only the renderer re-hydrates.

  // G2.b (issue #30 Phase 2 Team β) — CP busy indicator helpers.
  //
  // The Lisp hub pushes a 5-part envelope on /ws/control with
  // header.msg_type="status" before and after every legacy-CP INPUT
  // dispatch.  content.state drives the div:
  //   processing -> show spinner
  //   idle       -> hide
  //   error      -> flash red for 2 s, then hide
  //
  // Zero dependencies — this is vanilla JS touching the div installed
  // under .sidebar above.  No debounce: the server guarantees a paired
  // processing/terminal sequence per request.
  const cpStatusEl = document.getElementById('cp-status');
  let cpStatusErrorTimer = null;
  function setCpStatus(state) {
    if (!cpStatusEl) return;
    if (cpStatusErrorTimer) {
      clearTimeout(cpStatusErrorTimer);
      cpStatusErrorTimer = null;
    }
    cpStatusEl.classList.remove('active', 'error');
    const label = cpStatusEl.querySelector('.label');
    if (state === 'processing') {
      if (label) label.textContent = 'processing…';
      cpStatusEl.classList.add('active');
    } else if (state === 'error') {
      if (label) label.textContent = 'error';
      cpStatusEl.classList.add('error');
      cpStatusErrorTimer = setTimeout(() => {
        cpStatusEl.classList.remove('error');
        cpStatusErrorTimer = null;
      }, 2000);
    }
    // state === 'idle' (or anything else): both classes removed above.
  }

  function openControlWS() {
    const cws = new WebSocket('ws://' + location.host + '/ws/control');
    cws.onmessage = (ev) => {
      const msg = String(ev.data || '');
      if (msg.startsWith('reload:')) {
        const what = msg.slice('reload:'.length);
        if (what === 'term' || what === 'all') {
          // Force the iframe to re-fetch /shell. Same-origin, so the WS
          // to /ws/shell just reconnects and attaches to a fresh PTY.
          const base = termFrame.src.split('?')[0] || ghosttyUrl || '/shell';
          termFrame.src = base + '?hr=' + Date.now();
        }
        if (what === 'business-ui' || what === 'all' || what === 'static') {
          // Refresh only the sidebar fragments. Terminal iframe untouched.
          refreshPresets();
        }
        return;
      }
      // 5-part envelope probe: STATUS events arrive as JSON text frames.
      // Anything that fails JSON.parse or lacks header.msg_type is ignored,
      // so new msg_types added by future atoms don't break the UI.
      if (msg.length > 0 && msg.charAt(0) === '{') {
        try {
          const parsed = JSON.parse(msg);
          const hdr = parsed && parsed.header;
          if (hdr && hdr.msg_type === 'status' && parsed.content) {
            setCpStatus(String(parsed.content.state || ''));
          }
        } catch (_) {
          // Non-JSON control frame; drop silently.
        }
      }
    };
    cws.onclose = () => setTimeout(openControlWS, 1000);
  }
  openControlWS();

  // Preset buttons: click posts to /api/inject. Server broadcasts to all
  // connected /ws/shell sessions, including the iframe below. This is the
  // same path external curl callers use — proven via inject-e2e test.
  function runPreset(name, argv) {
    const text = (argv || []).join(' ') + '\n';
    fetch('/api/inject?text=' + encodeURIComponent(text))
      .catch(err => console.error('inject failed', err));
  }
  // Hot-swap hook: reload presets without a full page refresh whenever the
  // server signals /api/reload (Swank-driven). Cheap polling is fine for now;
  // swap for a /ws/control push channel when the reload rate justifies it.
  let lastPresetEtag = '';
  async function refreshPresets() {
    try {
      const r = await fetch('/api/presets', { cache: 'no-store' });
      if (!r.ok) return;
      const etag = r.headers.get('etag') || '';
      const presets = await r.json();
      const body = JSON.stringify(presets);
      if (body === lastPresetEtag) return;
      lastPresetEtag = body;
      const target = document.getElementById('presetList');
      target.classList.remove('placeholder');
      target.innerHTML = '';
      (presets || []).forEach(p => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = p.name;
        b.title = (p.argv || []).join(' ');
        b.addEventListener('click', () => runPreset(p.name, p.argv));
        target.appendChild(b);
      });
    } catch (_) { /* transient; retry next tick */ }
  }
  // Initial fill + steady polling. 2s is well under human perception of
  // "this didn't update" and keeps the server load trivial.
  refreshPresets();
  setInterval(refreshPresets, 2000);

  // #37 case C — inject form wiring.
  // Uses the same /api/inject endpoint as preset buttons and external curl.
  // IME preedit/confirmation is fully handled by the browser-native textarea;
  // we never touch e.key during composition so preedit is never truncated.
  (function () {
    const ta  = document.getElementById('inject-text');
    const btn = document.getElementById('inject-send');
    if (!ta || !btn) return;

    let flashTimer = null;
    function flash(cls) {
      ta.classList.remove('ok', 'err');
      ta.classList.add(cls);
      if (flashTimer) clearTimeout(flashTimer);
      flashTimer = setTimeout(() => ta.classList.remove(cls), 800);
    }

    async function sendInject() {
      const raw = ta.value;
      if (!raw) return;
      const text = raw + '\r'; // CR = shell Enter
      btn.disabled = true;
      try {
        const r = await fetch('/api/inject?text=' + encodeURIComponent(text), { method: 'GET' });
        if (r.ok) {
          ta.value = '';
          flash('ok');
        } else {
          flash('err');
        }
      } catch (_) {
        flash('err');
      } finally {
        btn.disabled = false;
        ta.focus();
      }
    }

    btn.addEventListener('click', sendInject);
    ta.addEventListener('keydown', function (e) {
      // Ctrl+Enter (or Cmd+Enter on Mac) submits. Skip if IME is composing.
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !e.isComposing) {
        e.preventDefault();
        sendInject();
      }
    });
  })();
</script>

</body>
</html>
