<!DOCTYPE html>
<!--
  Adapted from: photo-ai-rust/web/index.html (structure only).
  Stripped to the minimum that actually works: header + left sidebar
  (masters + presets) + terminal iframe. Disabled-button mocks and
  unimplemented tabs have been removed to avoid lying to the user
  about what's wired.
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<title>photo-ai-lisp</title>
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #22222a;
    --border: #33333a;
    --text: #e6e6ea;
    --text-muted: #8a8a94;
    --accent: #7c6fe0;
    --input-bg: #15151a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex;
  }

  .sidebar {
    width: 280px; padding: 12px;
    border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    flex-shrink: 0;
  }
  .sidebar .brand {
    font-size: 14px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px;
  }
  .sidebar .hint {
    font-size: 10px; color: var(--text-muted); line-height: 1.4;
  }
  .sidebar h2 {
    font-size: 11px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .btn {
    display: block; width: 100%; padding: 6px 10px;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; cursor: pointer; text-align: left;
    margin-bottom: 4px;
  }
  .btn:hover { border-color: var(--accent); }

  .terminal {
    flex: 1;
    background: #0f0f0f;
    /* Floor at 80-col-ish width so narrow browsers get a horizontal
       scrollbar instead of squishing the iframe. ghostty-web measures
       its container and derives column count from it — shrink the
       container and the terminal reflows to fewer columns, which
       breaks any 80-col ASCII art the CLI prints. */
    min-width: 720px;
  }
  .terminal iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }

  .placeholder {
    color: var(--text-muted); font-size: 12px; line-height: 1.6;
  }

  /* #37 case C rev2 — bottom-sticky chat bar */
  #chat-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; align-items: flex-end; gap: 8px;
    padding: 8px 12px;
    background: #1a1a1f; border-top: 1px solid #2a2a33;
    z-index: 20;
  }
  #chat-input {
    flex: 1; min-height: 2.8em; max-height: 6em;
    font: 13px/1.4 'Cascadia Mono', 'Consolas', monospace;
    background: #0f0f14; color: #e5e5e5;
    border: 1px solid #2a2a33; border-radius: 6px;
    padding: 6px 10px; resize: none; outline: none;
    overflow: hidden;
  }
  #chat-input:focus { border-color: #7aa2f7; }
  #chat-input.ok  { border-color: #73daca; }
  #chat-input.err { border-color: #f7768e; }
  #chat-send {
    background: #7aa2f7; color: #1a1a1f;
    border: none; border-radius: 6px;
    padding: 6px 16px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  #chat-send:disabled { opacity: 0.5; cursor: wait; }
  /* layout root: leave room for the fixed chat bar (~56px) */
  body { padding-bottom: 56px; }
  .terminal iframe { height: calc(100vh - 56px); }

  .master-group { margin-bottom: 8px; }
  .master-group > .head {
    font-size: 12px; font-weight: 600; margin-bottom: 2px;
  }
  .master-group ul {
    list-style: none; padding-left: 8px; font-size: 12px;
    color: var(--text-muted);
  }

  /* #38 — preset group header. Server-driven 2-level menu: presets
     with group=null render flat as before; presets sharing a group
     value get nested under one of these headers. The header itself is
     not a button (no inject) — purely a visual bucket. */
  .preset-group-head {
    font-size: 11px; text-transform: uppercase;
    color: var(--text-muted); margin: 8px 0 4px;
    padding-left: 2px;
  }
  .preset-group-body { padding-left: 8px; }

  /* G2.b (issue #30 Phase 2 Team β) — CP busy indicator.
     Hidden by default; the /ws/control status handler toggles it on
     STATUS=PROCESSING and off on STATUS=IDLE.  Inline CSS, zero deps.
     The spinner glyph uses a CSS keyframe so we don't need an image. */
  .cp-status {
    display: none;
    font-size: 14px;
    color: var(--text-muted);
    padding: 6px 10px;
    margin-top: 4px;
    border-radius: 4px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    line-height: 1.2;
  }
  .cp-status.active { display: inline-block; }
  .cp-status.error  {
    display: inline-block;
    color: #ff6a6a;
    border-color: #ff6a6a;
  }
  .cp-status .glyph {
    display: inline-block;
    animation: cp-spin 1.2s linear infinite;
  }
  @keyframes cp-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  /* Agent-running indicator. Click to toggle the client-side flag
     when it desyncs from reality (e.g. agent crashed, user typed
     /exit directly). Red dot = no agent; green = agent live. */
  .agent-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    padding: 4px 6px; margin-top: 4px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--input-bg);
    cursor: pointer; user-select: none;
  }
  .agent-indicator:hover { border-color: var(--accent); }
  .agent-indicator .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff6a6a;
  }
  .agent-indicator.running .dot { background: #73daca; }
  .btn:disabled {
    opacity: 0.35; cursor: not-allowed;
  }
  .btn:disabled:hover { border-color: var(--border); }
  /* IME live preview — updates in place on every composition event.
     Single line, just the current e.data, nothing else. */
  #ime-preview {
    margin-top: 8px;
    padding: 6px 8px;
    font: 13px 'Cascadia Mono', Consolas, monospace;
    color: #8c8;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: 4px;
    min-height: 1.6em;
    white-space: pre;
    overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div>
    <div class="brand">photo-ai-lisp</div>
    <div class="hint">curl /api/inject?text=... で外部からコマンド送信</div>
    <!-- G2.b: in-flight CP command indicator. Hidden until /ws/control
         pushes a status envelope with content.state=processing. -->
    <div id="cp-status" class="cp-status" aria-live="polite">
      <span class="glyph">⟳</span> <span class="label">processing…</span>
    </div>
    <!-- Agent running indicator. Click to toggle if it desyncs from
         the actual terminal state. Agent-mode presets are disabled
         until this flag is on. -->
    <div id="agent-state" class="agent-indicator" title="クリックで手動 toggle">
      <span class="dot"></span>
      <span class="label">agent off</span>
    </div>
  </div>
  <div>
    <h2>プリセット</h2>
    <div id="presetList" class="placeholder">(読込中)</div>
  </div>
  <!-- IME preview. Mirrors the current composition data (e.data)
       live. Single line, replaced on every compositionupdate. -->
  <div id="ime-preview" aria-live="polite"></div>
</aside>

<section class="terminal">
  <iframe id="terminal" src="about:blank"></iframe>
</section>

<div id="chat-bar">
  <textarea id="chat-input" rows="2"
            placeholder="Enter で送信 · Ctrl+Enter で改行"></textarea>
  <button id="chat-send" type="button">Send</button>
</div>

<script>
  // Terminal iframe — ghostty-web URL (or built-in /shell) injected by Lisp server.
  const ghosttyUrl = document.documentElement.dataset.ghosttyUrl;
  const termFrame = document.getElementById('terminal');
  if (ghosttyUrl) {
    termFrame.src = ghosttyUrl;
  }
  // Iframed ghostty-web renders into a hidden textarea for IME input.
  // That textarea only receives keystrokes when the iframe's window holds
  // focus — which it doesn't on first load (the parent document does).
  // Pull focus into the iframe once it's ready, and re-pull on window focus.
  termFrame.addEventListener('load', () => termFrame.contentWindow.focus());
  window.addEventListener('focus', () => termFrame.contentWindow.focus());

  // Live-reload channel. Server pushes 'reload:<module>' after /api/reload.
  //   term     -> the /shell page changed; re-src the iframe only.
  //   business-ui / all / static -> sidebar HTML changed; swap in place.
  // Either path avoids a full page refresh so the PTY (owned by Lisp)
  // keeps running and only the renderer re-hydrates.

  // G2.b (issue #30 Phase 2 Team β) — CP busy indicator helpers.
  //
  // The Lisp hub pushes a 5-part envelope on /ws/control with
  // header.msg_type="status" before and after every legacy-CP INPUT
  // dispatch.  content.state drives the div:
  //   processing -> show spinner
  //   idle       -> hide
  //   error      -> flash red for 2 s, then hide
  //
  // Zero dependencies — this is vanilla JS touching the div installed
  // under .sidebar above.  No debounce: the server guarantees a paired
  // processing/terminal sequence per request.
  const cpStatusEl = document.getElementById('cp-status');
  let cpStatusErrorTimer = null;
  function setCpStatus(state) {
    if (!cpStatusEl) return;
    if (cpStatusErrorTimer) {
      clearTimeout(cpStatusErrorTimer);
      cpStatusErrorTimer = null;
    }
    cpStatusEl.classList.remove('active', 'error');
    const label = cpStatusEl.querySelector('.label');
    if (state === 'processing') {
      if (label) label.textContent = 'processing…';
      cpStatusEl.classList.add('active');
    } else if (state === 'error') {
      if (label) label.textContent = 'error';
      cpStatusEl.classList.add('error');
      cpStatusErrorTimer = setTimeout(() => {
        cpStatusEl.classList.remove('error');
        cpStatusErrorTimer = null;
      }, 2000);
    }
    // state === 'idle' (or anything else): both classes removed above.
  }

  function openControlWS() {
    const cws = new WebSocket('ws://' + location.host + '/ws/control');
    cws.onmessage = (ev) => {
      const msg = String(ev.data || '');
      if (msg.startsWith('reload:')) {
        const what = msg.slice('reload:'.length);
        if (what === 'term' || what === 'all') {
          // Force the iframe to re-fetch /shell. Same-origin, so the WS
          // to /ws/shell just reconnects and attaches to a fresh PTY.
          const base = termFrame.src.split('?')[0] || ghosttyUrl || '/shell';
          termFrame.src = base + '?hr=' + Date.now();
        }
        if (what === 'business-ui' || what === 'all' || what === 'static') {
          // Refresh only the sidebar fragments. Terminal iframe untouched.
          refreshPresets();
        }
        return;
      }
      // 5-part envelope probe: STATUS events arrive as JSON text frames.
      // Anything that fails JSON.parse or lacks header.msg_type is ignored,
      // so new msg_types added by future atoms don't break the UI.
      if (msg.length > 0 && msg.charAt(0) === '{') {
        try {
          const parsed = JSON.parse(msg);
          const hdr = parsed && parsed.header;
          if (hdr && hdr.msg_type === 'status' && parsed.content) {
            setCpStatus(String(parsed.content.state || ''));
          }
        } catch (_) {
          // Non-JSON control frame; drop silently.
        }
      }
    };
    cws.onclose = () => setTimeout(openControlWS, 1000);
  }
  openControlWS();

  // Preset buttons: click posts to /api/inject. Server broadcasts to all
  // connected /ws/shell sessions, including the iframe below. This is the
  // same path external curl callers use — proven via inject-e2e test.
  //
  // Wire contract (see .dispatch/inject-contract-audit.md): every payload
  // terminates with a single bare LF. %normalize-child-input flips LF→CR
  // so cmd.exe / bash sees exactly one Enter. Never emit \r\n here — that
  // normalizes to \r\r and a trailing CR eats any live `set /p` prompt.
  //
  // #38 — preset.input follow-up: when a preset carries a non-null `input`
  // string, it represents the initial prompt to feed the agent the argv
  // just spawned (e.g. `claude --dangerously-skip-permissions`). We inject
  // argv first, then after the agent has had a chance to come up, inject
  // input via the same /api/inject path. There is no UI-observable
  // ready-signal for a subprocess (picker-auto-inject uses a server-side
  // sleep 0.4 after spawn; that signal is not exposed to the browser),
  // so we fall back to a setTimeout. 2500ms covers Claude CLI cold-start
  // on typical hardware with margin.
  // TODO(#38): replace the setTimeout with a /ws/control "agent-ready"
  // frame once the server emits one, or probe child-stdout for a known
  // ready marker.
  // ---- green debug log --------------------------------------------
  //
  // IME composition events arrive as postMessage from the /shell
  // iframe. Mirror e.data into #ime-preview and nothing else — no
  // timestamps, no kind label, no utf8 hex, no scroll history. Just
  // the current composition text.
  window.addEventListener('message', (ev) => {
    const m = ev.data;
    if (!m || m.type !== 'ime') return;
    const el = document.getElementById('ime-preview');
    if (el) el.textContent = m.data || '';
  });

  function injectText(text) {
    return fetch('/api/inject?text=' + encodeURIComponent(text))
      .catch(err => console.error('inject failed', err));
  }

  // ---- agent-running state (client-side, heuristic) ----------------
  //
  // We can't cheaply probe whether an interactive TUI is live in the
  // PTY, so we track it client-side and let the user correct drift.
  // Transitions:
  //   · spawn-mode click on an agent preset  → agentRunning = true
  //   · click on a preset whose argv starts with "/exit" → false
  //   · manual toggle via the sidebar indicator → flips
  //
  // While agentRunning is false, every agent-mode button is disabled
  // so a stray click can't type "1" + a multi-KB paste into a bare
  // cmd prompt.
  let agentRunning = localStorage.getItem('agentRunning') === '1';
  function setAgentRunning(v) {
    agentRunning = !!v;
    try { localStorage.setItem('agentRunning', agentRunning ? '1' : '0'); }
    catch (_) { /* private browsing etc. — fine to ignore */ }
    renderAgentIndicator();
    applyAgentGate();
  }
  function renderAgentIndicator() {
    const el = document.getElementById('agent-state');
    if (!el) return;
    el.classList.toggle('running', agentRunning);
    const label = el.querySelector('.label');
    if (label) label.textContent = agentRunning ? 'agent on' : 'agent off';
  }
  function applyAgentGate() {
    document.querySelectorAll('#presetList button').forEach(b => {
      if (b.dataset.agentGated === '1') {
        b.disabled = !agentRunning;
      }
    });
  }
  (function initAgentIndicator() {
    const el = document.getElementById('agent-state');
    if (!el) return;
    el.addEventListener('click', () => setAgentRunning(!agentRunning));
    renderAgentIndicator();
  })();

  // ---- shared inject primitives ------------------------------------
  //
  // All preset buttons flow through these helpers, so the submit
  // protocol, picker-digit table, and timing constants live in exactly
  // one place.  Adding a new agent = one line in AGENT_SPAWN_DIGIT.
  // Tweaking the paste→submit gap = one constant.
  const AGENT_SPAWN_DIGIT  = { claude: '1', gemini: '2', codex: '3' };
  const AGENT_COLD_START_MS = 2500;   // after picker digit, before first prompt
  const AGENT_SUBMIT_GAP_MS = 300;    // between paste body and trailing Enter

  // sendToAgent — paste a multi-line chat prompt into an interactive
  // TUI (claude/gemini/codex). Each \n inside BODY becomes a soft
  // newline; we hold the submit Enter until the paste burst has
  // settled so the trailing CR is treated as "send" not "newline".
  function sendToAgent(body) {
    injectText(body);
    setTimeout(() => injectText('\n'), AGENT_SUBMIT_GAP_MS);
  }
  // sendToShell — fire a single shell command terminated by one Enter.
  // Server normalises LF→CR so cmd.exe / bash see exactly one press.
  function sendToShell(cmd) {
    injectText(cmd + '\n');
  }
  // spawnAgent — select AGENT from pick-agent.cmd (digit + Enter).
  // Returns the Promise so callers can chain a cold-start timer.
  function spawnAgent(agent) {
    const d = AGENT_SPAWN_DIGIT[agent];
    if (!d) {
      console.error('spawnAgent: unknown agent', agent);
      return Promise.resolve();
    }
    return injectText(d + '\n');
  }

  function runPreset(name, argv, input, agent) {
    // Three preset kinds, decided by (hasArgv, hasAgent, hasInput):
    //
    //   launcher  (argv + agent)  — spawn command types into cmd;
    //     after cold-start delay we flip agentRunning=true so prompt
    //     presets enable themselves. No dialog; one click = one launch.
    //   prompt    (agent + input, no argv) — paste+submit INPUT into
    //     the running agent. Gated on agentRunning being true (button
    //     disabled otherwise so this code path only runs when live).
    //   shell     (argv, no agent) — type argv into cmd and optionally
    //     follow with input as a second shell command. /exit at the
    //     head flips agentRunning=false (the agent is terminating).
    //
    // No confirm dialog.  The agent-running gate already hides prompt
    // presets when no agent is live, so every clickable button maps
    // to exactly one intended action — a native popup per click is
    // pure friction.
    const hasInput  = typeof input === 'string' && input.length > 0;
    const hasArgv   = Array.isArray(argv) && argv.length > 0;
    const hasAgent  = typeof agent === 'string' && agent.length > 0;

    const isLauncher = hasArgv && hasAgent;
    const isPrompt   = hasAgent && !hasArgv && hasInput;
    const isShell    = hasArgv && !hasAgent;

    if (isLauncher) {
      injectText((argv || []).join(' ') + '\n');
      // Agent cold-start: bump the flag so downstream prompt buttons
      // un-gate themselves when the user is ready to click them.
      setTimeout(() => setAgentRunning(true), AGENT_COLD_START_MS);
      return;
    }
    if (isPrompt) {
      sendToAgent(input);
      return;
    }
    if (isShell) {
      // /exit → agent is dying; flip the flag so prompt presets re-gate.
      if (argv[0] === '/exit') setAgentRunning(false);
      injectText((argv || []).join(' ') + '\n');
      if (hasInput) {
        setTimeout(() => sendToShell(input), AGENT_SUBMIT_GAP_MS);
      }
      return;
    }
    // Fallback — only hit if a preset is misconfigured (no argv, no
    // agent, no input). Nothing to do.
    console.warn('runPreset: empty preset', name);
  }
  // Hot-swap hook: reload presets without a full page refresh whenever the
  // server signals /api/reload (Swank-driven). Cheap polling is fine for now;
  // swap for a /ws/control push channel when the reload rate justifies it.
  let lastPresetEtag = '';
  async function refreshPresets() {
    try {
      const r = await fetch('/api/presets', { cache: 'no-store' });
      if (!r.ok) return;
      const etag = r.headers.get('etag') || '';
      const presets = await r.json();
      const body = JSON.stringify(presets);
      if (body === lastPresetEtag) return;
      lastPresetEtag = body;
      const target = document.getElementById('presetList');
      target.classList.remove('placeholder');
      target.innerHTML = '';
      // #38 — 2-level grouping. group=null → flat button at top level.
      // group="X" → first encounter creates a header + body container,
      // subsequent presets with the same group append into that body.
      // Order is preserved exactly as the server emits it (declaration
      // order from defpreset), so layout is controlled in presets.lisp.
      const groupBodies = Object.create(null);
      (presets || []).forEach(p => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = p.name;
        // Gate only PROMPT presets (agent set, argv empty) on
        // agentRunning — those need a live TUI to paste into.
        // Launchers (agent + argv) must stay clickable so the user
        // can start an agent in the first place. Shell presets
        // (no agent) are always clickable.
        const hasAgent = typeof p.agent === 'string' && p.agent.length > 0;
        const hasArgv  = Array.isArray(p.argv) && p.argv.length > 0;
        const isPrompt = hasAgent && !hasArgv;
        b.dataset.agentGated = isPrompt ? '1' : '0';
        if (isPrompt && !agentRunning) b.disabled = true;
        // No tooltip — the button label is the source of truth and
        // any dynamic hint (gated/ungated, argv, agent id) goes
        // stale between refreshPresets ticks, which misleads the
        // user.  Disabled state alone communicates "not available
        // right now".
        b.addEventListener('click', () => runPreset(p.name, p.argv, p.input, p.agent));
        const g = (typeof p.group === 'string' && p.group.length > 0) ? p.group : null;
        if (g === null) {
          target.appendChild(b);
          return;
        }
        let body = groupBodies[g];
        if (!body) {
          const head = document.createElement('div');
          head.className = 'preset-group-head';
          head.textContent = g;
          target.appendChild(head);
          body = document.createElement('div');
          body.className = 'preset-group-body';
          target.appendChild(body);
          groupBodies[g] = body;
        }
        body.appendChild(b);
      });
    } catch (_) { /* transient; retry next tick */ }
  }
  // Initial fill + steady polling. 2s is well under human perception of
  // "this didn't update" and keeps the server load trivial.
  refreshPresets();
  setInterval(refreshPresets, 2000);

  // #37 case C rev2 — bottom chat-bar wiring.
  // Textarea auto-grows 1-6 lines. Ctrl+Enter submits; bare Enter = newline.
  // IME composition is respected: isComposing guard prevents mid-preedit send.
  (function () {
    const ta  = document.getElementById('chat-input');
    const btn = document.getElementById('chat-send');
    if (!ta || !btn) return;

    function autoGrow() {
      ta.style.height = 'auto';
      const lh = parseFloat(getComputedStyle(ta).lineHeight) || 18;
      ta.style.height = Math.min(ta.scrollHeight, 6 * lh) + 'px';
    }

    async function send() {
      const raw = ta.value;
      if (!raw) return;
      btn.disabled = true;
      try {
        const r = await fetch('/api/inject?text=' + encodeURIComponent(raw + '\r'), { method: 'GET' });
        if (r.ok) {
          ta.value = '';
          autoGrow();
          ta.classList.remove('err'); ta.classList.add('ok');
        } else {
          ta.classList.remove('ok'); ta.classList.add('err');
        }
      } catch (_) {
        ta.classList.remove('ok'); ta.classList.add('err');
      } finally {
        setTimeout(() => ta.classList.remove('ok', 'err'), 800);
        btn.disabled = false;
        ta.focus();
      }
    }

    btn.addEventListener('click', send);
    ta.addEventListener('input', autoGrow);
    ta.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' || e.isComposing) return;
      // Enter alone submits (chat convention). Ctrl/Shift+Enter inserts a
      // newline via the textarea default. Meta+Enter also inserts a newline
      // for consistency across platforms.
      if (e.ctrlKey || e.metaKey || e.shiftKey) return;
      e.preventDefault();
      send();
    });
  })();
</script>

</body>
</html>
