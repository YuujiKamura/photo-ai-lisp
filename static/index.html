<!DOCTYPE html>
<!--
  Adapted from: photo-ai-rust/web/index.html (structure only).
  Stripped to the minimum that actually works: header + left sidebar
  (masters + presets) + terminal iframe. Disabled-button mocks and
  unimplemented tabs have been removed to avoid lying to the user
  about what's wired.
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<title>photo-ai-lisp</title>
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #22222a;
    --border: #33333a;
    --text: #e6e6ea;
    --text-muted: #8a8a94;
    --accent: #7c6fe0;
    --input-bg: #15151a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--accent); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header .hint {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
  }

  .main { flex: 1; display: flex; min-height: 0; }

  .sidebar {
    width: 280px; padding: 12px;
    border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }
  .sidebar h2 {
    font-size: 11px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .btn {
    display: block; width: 100%; padding: 6px 10px;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; cursor: pointer; text-align: left;
    margin-bottom: 4px;
  }
  .btn:hover { border-color: var(--accent); }

  .terminal {
    flex: 1;
    background: #0f0f0f;
    min-width: 0;
  }
  .terminal iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }

  .placeholder {
    color: var(--text-muted); font-size: 12px; line-height: 1.6;
  }
  .master-group { margin-bottom: 8px; }
  .master-group > .head {
    font-size: 12px; font-weight: 600; margin-bottom: 2px;
  }
  .master-group ul {
    list-style: none; padding-left: 8px; font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">P</div>
  <h1>photo-ai-lisp</h1>
  <span class="hint">curl /api/inject?text=... で外部からコマンド送信</span>
</header>

<div class="main">

  <aside class="sidebar">
    <div>
      <h2>工種マスタ</h2>
      <div id="masterList" class="placeholder">(読込中)</div>
    </div>
    <div>
      <h2>プリセット</h2>
      <div id="presetList" class="placeholder">(読込中)</div>
    </div>
  </aside>

  <section class="terminal">
    <iframe id="terminal" src="about:blank"></iframe>
  </section>

</div>

<script>
  // Terminal iframe — ghostty-web URL (or built-in /shell) injected by Lisp server.
  const ghosttyUrl = document.documentElement.dataset.ghosttyUrl;
  if (ghosttyUrl) {
    document.getElementById('terminal').src = ghosttyUrl;
  }

  // Preset buttons: click sends argv joined + CR into the terminal iframe.
  function injectIntoTerminal(line) {
    const iframe = document.getElementById('terminal');
    if (!iframe || !iframe.contentWindow) return;
    iframe.contentWindow.postMessage({ type: 'inject', data: line }, '*');
  }
  function runPreset(name, argv) {
    // cmd.exe needs CRLF, bash accepts either; send both for safety.
    injectIntoTerminal((argv || []).join(' ') + '\r\n');
  }
  (function loadPresets() {
    const target = document.getElementById('presetList');
    if (!target) return;
    fetch('/api/presets')
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(presets => {
        if (!Array.isArray(presets) || presets.length === 0) {
          target.textContent = '(無し)';
          return;
        }
        target.classList.remove('placeholder');
        target.innerHTML = '';
        presets.forEach(p => {
          const b = document.createElement('button');
          b.className = 'btn';
          b.textContent = p.name;
          b.title = (p.argv || []).join(' ');
          b.addEventListener('click', () => runPreset(p.name, p.argv));
          target.appendChild(b);
        });
      })
      .catch(err => { target.textContent = '(読込失敗: ' + err.message + ')'; });
  })();

  // Master CSV display.
  (function loadMasters() {
    const target = document.getElementById('masterList');
    if (!target) return;
    fetch('/api/masters')
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(files => {
        if (!Array.isArray(files) || files.length === 0) {
          target.textContent = '(空)';
          return;
        }
        target.classList.remove('placeholder');
        target.innerHTML = '';
        files.forEach(f => {
          const g = document.createElement('div');
          g.className = 'master-group';
          const h = document.createElement('div');
          h.className = 'head';
          h.textContent = f.file;
          g.appendChild(h);
          const ul = document.createElement('ul');
          (f.rows || []).forEach(r => {
            const li = document.createElement('li');
            li.textContent = '├ ' + (r.label_ja || r.id);
            li.title = r.id + (r.aliases && r.aliases.length
              ? ' [' + r.aliases.join(', ') + ']' : '');
            ul.appendChild(li);
          });
          g.appendChild(ul);
          target.appendChild(g);
        });
      })
      .catch(err => { target.textContent = '(読込失敗: ' + err.message + ')'; });
  })();
</script>

</body>
</html>
