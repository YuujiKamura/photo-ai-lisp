name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl

      - name: Cache Quicklisp
        id: cache-ql
        uses: actions/cache@v4
        with:
          path: ~/quicklisp
          key: quicklisp-${{ runner.os }}-v1

      - name: Bootstrap Quicklisp
        if: steps.cache-ql.outputs.cache-hit != 'true'
        run: |
          curl -sS -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval '(ql-util:without-prompting (ql:add-to-init-file))'

      - name: Link project into local-projects
        run: |
          mkdir -p ~/quicklisp/local-projects
          ln -sfn "$GITHUB_WORKSPACE" ~/quicklisp/local-projects/photo-ai-lisp

      - name: Lint (load-system warnings)
        run: |
          sbcl --non-interactive \
               --load scripts/lint.lisp

      - name: Run tests
        run: |
          sbcl --non-interactive \
               --load ~/quicklisp/setup.lisp \
               --eval '(ql:quickload :fiveam :silent t)' \
               --eval '(ql:quickload :photo-ai-lisp :silent t)' \
               --eval '(asdf:load-system :photo-ai-lisp/tests)' \
               --eval '(photo-ai-lisp/tests:run-tests)'
